name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests
        run: make unit-test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out

      - name: Coverage summary
        if: always()
        run: go tool cover -func=cover.out | tail -1

  manifest-render-test:
    name: Manifest Rendering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Fetch upstream manifests
        run: make manifests-fetch

      - name: Validate manifest rendering
        run: go test ./internal/controller/ -run TestRenderRealManifests -v -count=1

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate code
        run: make generate

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate code
        run: make generate

      - name: Run go vet
        run: go vet ./...

  kube-linter:
    name: kube-linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate manifests
        run: make manifests

      - name: Install kube-linter
        run: go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest

      - name: Lint Kustomize output
        run: |
          make kustomize
          bin/kustomize build config/default | kube-linter lint - || true
